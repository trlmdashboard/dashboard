<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 baby cam · crown & horn fun</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #fde9f0 0%, #f9d8e6 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
        }
        .studio {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 3.5rem 3.5rem 2.5rem 2.5rem;
            box-shadow: 0 30px 45px rgba(0,0,0,0.15), 0 10px 20px rgba(110, 40, 60, 0.2);
            padding: 25px 30px 35px;
            max-width: 900px;
            width: fit-content;
            border: 4px solid white;
        }
        h1 {
            text-align: center;
            margin: 0 0 15px 0;
            font-size: 2.6rem;
            font-weight: 600;
            color: #6b3e4f;
            text-shadow: 4px 4px 0 #ffc2d9;
            letter-spacing: 1px;
            word-break: keep-all;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        h1 span {
            font-size: 3rem;
            transform: rotate(5deg);
            display: inline-block;
        }
        .video-panel {
            position: relative;
            display: flex;
            justify-content: center;
            border-radius: 2rem;
            overflow: hidden;
            border: 8px solid #ffeef4;
            box-shadow: inset 0 0 0 2px #ffb6d1, 0 15px 25px #ddaabb;
            background: #f4c6d2;
        }
        video {
            display: block;
            width: 100%;
            max-width: 720px;
            height: auto;
            transform: scaleX(-1);  /* mirror view – more natural for selfie */
            background: #b88b99; /* fallback */
            pointer-events: none;  /* so overlay catches all interactions */
        }
        .overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;  /* let touches pass through to video? but we need clicks on items? 
                                      we'll place controls outside, and selection via buttons */
        }
        /* we actually draw everything on canvas, no interactive overlay items — simpler */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px 25px;
            margin: 30px 0 15px;
        }
        .item-btn {
            background: #fff5fa;
            border: 4px solid #ffb8cf;
            border-radius: 60px;
            padding: 16px 25px;
            font-size: 1.8rem;
            line-height: 1;
            font-weight: bold;
            color: #5f3748;
            box-shadow: 0 7px 0 #d48faa, 0 10px 18px rgba(180, 100, 120, 0.3);
            cursor: pointer;
            transition: all 0.07s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transform: translateY(0);
        }
        .item-btn:active {
            box-shadow: 0 2px 0 #b16f8a;
            transform: translateY(5px);
        }
        .item-btn.selected {
            background: #ffe7b0;
            border-color: #f4a7c3;
            box-shadow: 0 0 0 4px #fce599, 0 4px 0 #b16f8a;
        }
        .badge {
            background: #ffe2ed;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #422b33;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 2px dashed #ff98bb;
        }
        .action-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            align-items: center;
            margin: 25px 0 5px;
            flex-wrap: wrap;
        }
        .reset-btn {
            background: #ffffffd9;
            border: 3px solid #a75b75;
            border-radius: 50px;
            padding: 12px 35px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #702c48;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 5px 0 #81445b;
            transition: 0.08s;
        }
        .reset-btn:active {
            box-shadow: 0 1px 0 #81445b;
            transform: translateY(4px);
        }
        .toggle-cam {
            background: #b7e2d3;
            border: 3px solid #519a84;
            color: #1a4d3e;
            box-shadow: 0 5px 0 #367a66;
        }
        .note {
            text-align: center;
            font-size: 1.25rem;
            margin-top: 15px;
            color: #9f627b;
            background: #fff3f9cc;
            padding: 8px 25px;
            border-radius: 60px;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            border: 2px solid white;
        }
        .footer {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="studio">
    <h1>
        <span>👼</span> baby bling <span>🎈</span>
    </h1>
    <div class="video-panel">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="effectCanvas" class="overlay-canvas"></canvas>
    </div>

    <div class="toolbar">
        <div class="item-btn" data-item="crown" id="btnCrown">
            👑 crown
        </div>
        <div class="item-btn" data-item="horn" id="btnHorn">
            🦄 horn
        </div>
        <div class="item-btn" data-item="both" id="btnBoth">
            👑+🦄 both
        </div>
        <div class="badge">
            <span>✨</span> tap to wear <span>✨</span>
        </div>
    </div>

    <div class="action-row">
        <div class="reset-btn" id="resetBtn"> ✖ remove all</div>
        <div class="reset-btn toggle-cam" id="camToggle"> 📷 restart camera</div>
    </div>
    <div class="footer">
        <div class="note">🥰 move around – crown & horn follow your little one</div>
    </div>
</div>

<script>
    (function() {
        // ---------- elements ----------
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('effectCanvas');
        const ctx = canvas.getContext('2d');

        // buttons
        const btnCrown = document.getElementById('btnCrown');
        const btnHorn = document.getElementById('btnHorn');
        const btnBoth = document.getElementById('btnBoth');
        const resetBtn = document.getElementById('resetBtn');
        const camToggle = document.getElementById('camToggle');

        // state
        let activeItem = 'none';          // 'crown', 'horn', 'both'
        let videoStream = null;
        let animationFrame = null;

        // ----- helper: stop cam -----
        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
                video.srcObject = null;
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
        }

        // ----- start camera -----
        async function startCamera() {
            stopCamera(); // ensure clean
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                videoStream = stream;
                video.srcObject = stream;

                // wait for video to be ready, then set canvas size and start loop
                video.addEventListener('loadeddata', function onLoad() {
                    video.removeEventListener('loadeddata', onLoad);
                    resizeCanvasToVideo();
                    if (animationFrame) cancelAnimationFrame(animationFrame);
                    drawLoop();
                }, { once: true });
            } catch (err) {
                alert('camera access needed for baby fun! 🎥 please allow permissions.');
                console.warn(err);
                // fallback: still show canvas with empty?
            }
        }

        // match canvas to video display size (CSS may scale, we use actual video dimensions)
        function resizeCanvasToVideo() {
            if (!video.videoWidth || !video.videoHeight) return;

            const videoRect = video.getBoundingClientRect();
            // set canvas drawing buffer to match video resolution (sharp)
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // but we need to handle CSS scaling: canvas will be stretched by CSS to fit container.
            // that's fine — we draw using original video coordinates.
            canvas.style.width = '100%';
            canvas.style.height = '100%';
        }

        // ----- drawing loop -----
        function drawLoop() {
            if (!video.videoWidth || !video.videoHeight) {
                // keep waiting if video not ready
                animationFrame = requestAnimationFrame(drawLoop);
                return;
            }

            // Ensure canvas dimensions match video (in case of resize/orientation change)
            if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            // draw the video frame (mirrored effect because video is mirrored via CSS transform)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();

            // Since video element is visually mirrored (scaleX -1), we need to draw the video
            // normally, then mirror the accessories? Actually easiest:
            // Draw video normally (it appears mirrored on screen, but we want the accessories to
            // be consistent with that mirror. So we draw video first (which is the raw camera feed)
            // then we draw accessories and also mirror them? 
            // But we want crown to appear on top of baby's head as seen in mirror.
            // To simplify: we draw the video as it is (raw, not mirrored in code),
            // and later apply the same mirror transform to the accessories.
            // But the canvas is overlayed on a mirrored video (CSS transform). So if we draw raw video
            // it would conflict? Wait: video is mirrored via CSS, so the displayed pixels are mirrored.
            // Our canvas sits on top, and we want crown to be on the mirrored position.
            // Therefore we need to mirror the drawing context to match the video display.
            // we can apply ctx.translate(canvas.width, 0) and scale(-1,1) to match the video mirror.

            // Let's do that: set transform to mirror X, so coordinates align with what user sees.
            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);

            // Draw the video (so it fills canvas, but note: video is already displayed below, but we draw it to be safe)
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();  // restore to normal orientation for accessory drawing? 
            // But now accessories would be drawn non-mirrored, so they'd appear on wrong side. 
            // Better: keep mirror transform for everything. Let's reset and apply mirror from start.

            // simpler: we draw everything under a consistent mirror transform.
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            // mirror context (so drawn items match the mirrored video)
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);

            // draw the video (mirrored content – but because we are mirroring the context, 
            // the video draws correctly: actually we need to NOT mirror the video itself if we mirror context? 
            // The video feed is not mirrored by default. We want it to appear mirrored as user expects.
            // Since context is mirrored, drawing the video normally will result in a double-mirror? Wait:
            // context mirror flips the coordinate system. The video pixel data is not mirrored.
            // If we draw video with ctx mirror, it will appear mirrored on canvas (good, because CSS mirror also mirrors).
            // So final overlay matches mirror exactly. Good.
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Now draw accessories based on activeItem
            const headY = canvas.height * 0.25;  // rough forehead area (tweakable)
            const headCenterX = canvas.width * 0.5;  // middle of head

            // all measurements relative to canvas size (responsive)
            const crownWidth = canvas.width * 0.45;
            const crownHeight = canvas.height * 0.25;
            const hornWidth = canvas.width * 0.18;
            const hornHeight = canvas.height * 0.23;

            // draw crown if needed
            if (activeItem === 'crown' || activeItem === 'both') {
                drawCrown(headCenterX, headY - crownHeight * 0.2, crownWidth, crownHeight);
            }

            // draw horn if needed (unicorn horn on forehead)
            if (activeItem === 'horn' || activeItem === 'both') {
                drawHorn(headCenterX, headY - hornHeight * 0.2, hornWidth, hornHeight);
            }

            ctx.restore(); // restore from mirror

            // request next frame
            animationFrame = requestAnimationFrame(drawLoop);
        }

        // drawing helpers (called inside mirrored context)
        function drawCrown(x, y, w, h) {
            ctx.save();
            ctx.shadowColor = '#ffe5b0';
            ctx.shadowBlur = 18;
            ctx.shadowOffsetY = 4;
            // main crown band
            ctx.beginPath();
            ctx.fillStyle = '#f9d71c';
            ctx.strokeStyle = '#c89f22';
            ctx.lineWidth = w * 0.03;
            // three peaks
            const peak1X = x - w * 0.3;
            const peak2X = x;
            const peak3X = x + w * 0.3;
            const baseY = y + h * 0.6;
            const tipY = y - h * 0.2;
            ctx.moveTo(peak1X - w*0.15, baseY);
            ctx.lineTo(peak1X, tipY);
            ctx.lineTo(peak2X - w*0.08, baseY - h*0.1);
            ctx.lineTo(peak2X, tipY - h*0.05);
            ctx.lineTo(peak2X + w*0.08, baseY - h*0.1);
            ctx.lineTo(peak3X, tipY);
            ctx.lineTo(peak3X + w*0.15, baseY);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // add jewels
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.fillStyle = '#ff4d6d';
            ctx.arc(peak1X - w*0.05, tipY + h*0.12, w*0.06, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#4d9fff';
            ctx.arc(peak2X, tipY - h*0.02, w*0.07, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#ffb347';
            ctx.arc(peak3X + w*0.05, tipY + h*0.1, w*0.06, 0, 2*Math.PI);
            ctx.fill();
            ctx.restore();
        }

        function drawHorn(x, y, w, h) {
            ctx.save();
            ctx.shadowColor = '#ffb3b3';
            ctx.shadowBlur = 16;
            ctx.shadowOffsetY = 3;
            // horn shape (unicorn)
            ctx.beginPath();
            ctx.moveTo(x - w*0.3, y + h*0.4);
            ctx.lineTo(x, y - h*0.7);
            ctx.lineTo(x + w*0.3, y + h*0.4);
            ctx.closePath();
            // gradient
            const grad = ctx.createLinearGradient(x - w*0.2, y, x + w*0.2, y + h*0.5);
            grad.addColorStop(0, '#f5b0ff');
            grad.addColorStop(0.5, '#ffe09f');
            grad.addColorStop(1, '#ffb3c6');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#c85ba0';
            ctx.lineWidth = w*0.04;
            ctx.stroke();

            // sparkles
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#fffed9';
            ctx.beginPath();
            ctx.arc(x - w*0.1, y - h*0.4, w*0.1, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#ffeca1';
            ctx.beginPath();
            ctx.arc(x + w*0.1, y - h*0.3, w*0.07, 0, 2*Math.PI);
            ctx.fill();
            ctx.restore();
        }

        // ----- button handling -----
        function setActive(item) {
            activeItem = item;
            // update selected style
            btnCrown.classList.remove('selected');
            btnHorn.classList.remove('selected');
            btnBoth.classList.remove('selected');
            if (item === 'crown') btnCrown.classList.add('selected');
            else if (item === 'horn') btnHorn.classList.add('selected');
            else if (item === 'both') btnBoth.classList.add('selected');
        }

        btnCrown.addEventListener('click', () => setActive('crown'));
        btnHorn.addEventListener('click', () => setActive('horn'));
        btnBoth.addEventListener('click', () => setActive('both'));
        resetBtn.addEventListener('click', () => setActive('none'));

        camToggle.addEventListener('click', () => {
            startCamera();
        });

        // also if video element resizes due to container, we update canvas on each loop anyway.

        // initialize on page load
        window.addEventListener('load', () => {
            startCamera();
        });

        // clean up on page unload
        window.addEventListener('beforeunload', () => {
            stopCamera();
        });

        // optional: resize observer to adjust canvas if video dimensions change dynamically (like rotate)
        const resizeObserver = new ResizeObserver(() => {
            if (video.videoWidth && canvas.width !== video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }
        });
        resizeObserver.observe(video);
    })();
</script>
</body>
</html>
