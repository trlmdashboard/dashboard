    <style type="text/css">

        /* ===== OVERRIDE MASTER CONTENT PADDING FOR FULL-WIDTH LAYOUT ===== */
        .content-area {
            padding: 0 !important;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #f0f2f5;
        }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e4ea;
            flex-shrink: 0;
        }

        .category-buttons {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
            margin-bottom: 10px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .category-buttons::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 5px 14px;
            background: #f0f2f5;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .cat-btn:hover  { background: #e2e6ea; }
        .cat-btn.active { background: #1a6b3c; color: white; border-color: #1a6b3c; }

        .search-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 9px 16px;
            border: 1px solid #ddd;
            border-radius: 22px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: #1a6b3c; box-shadow: 0 0 0 2px rgba(26,107,60,0.15); }

        .search-btn {
            padding: 9px 18px;
            background: #1a6b3c;
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .search-btn:hover { background: #155530; }

        .product-count-bar {
            margin-top: 8px;
            font-size: 12px;
            color: #7a8090;
            text-align: right;
        }

        /* ===== PRODUCT GRID ===== */
        .product-grid-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 600px) { .product-grid-container { padding: 12px; } }
        @media (min-width: 900px) { .product-grid-container { padding: 14px; } }

        .product-grid-container::-webkit-scrollbar { width: 5px; }
        .product-grid-container::-webkit-scrollbar-thumb { background: #c0c7d0; border-radius: 4px; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        /* Mobile landscape: 5 columns */
        @media (max-width: 900px) and (orientation: landscape) {
            .product-grid { grid-template-columns: repeat(5, 1fr); gap: 8px; }
        }

        /* Tablet portrait: 4 columns */
        @media (min-width: 600px) and (orientation: portrait) {
            .product-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
        }

        /* Tablet landscape / small desktop: 4 columns */
        @media (min-width: 900px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
        }

        /* Desktop: 5 columns */
        @media (min-width: 1200px) {
            .product-grid { grid-template-columns: repeat(5, 1fr); gap: 14px; }
        }

        /* ===== PRODUCT CARD ===== */
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.13);
        }

        .product-card.out-of-stock {
            opacity: 0.55;
            cursor: not-allowed;
            pointer-events: none;
        }

        .discount-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #dc3545;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            z-index: 10;
        }

        .product-image {
            width: 100%;
            height: 90px;
            object-fit: cover;
            background: #f5f5f5;
            display: block;
        }

        /* Taller image on wider screens */
        @media (min-width: 600px) { .product-image { height: 120px; } }
        @media (min-width: 900px) { .product-image { height: 140px; } }

        .product-content {
            padding: 6px 7px 8px;
        }

        @media (min-width: 600px) { .product-content { padding: 8px 9px 10px; } }
        @media (min-width: 900px) { .product-content { padding: 10px 10px 12px; } }

        .product-category {
            display: inline-block;
            background: #d4f4e2;
            color: #1a6b3c;
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        @media (min-width: 600px) { .product-category { font-size: 10px; padding: 2px 7px; } }

        .product-name {
            font-size: 11px;
            font-weight: 600;
            color: #222;
            line-height: 1.3;
            height: 30px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 4px;
        }

        @media (min-width: 600px) {
            .product-name { font-size: 12px; height: 32px; }
        }
        @media (min-width: 900px) {
            .product-name { font-size: 13px; height: 36px; margin-bottom: 6px; }
        }

        .product-price-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .product-price {
            font-size: 12px;
            font-weight: 700;
            color: #e44d26;
        }

        @media (min-width: 600px) { .product-price { font-size: 13px; } }
        @media (min-width: 900px) { .product-price { font-size: 15px; } }

        .original-price {
            font-size: 12px;
            color: #aaa;
            text-decoration: line-through;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .stock-info {
            margin-top: 6px;
            font-size: 11px;
            font-weight: 600;
            padding-top: 6px;
            border-top: 1px solid #f0f0f0;
        }

        .stock-good { color: #1a6b3c; }
        .stock-low  { color: #dc3545; }
        .stock-out  { color: #aaa; font-style: italic; }

        /* ===== SKELETON LOADERS ===== */
        .skeleton-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .skeleton-img {
            width: 100%;
            height: 140px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }

        .skeleton-body { padding: 10px; }

        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            margin-bottom: 8px;
        }

        .skeleton-line.short { width: 55%; }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== NO PRODUCTS / ERROR ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            color: #7a8090;
        }

        .empty-state i { font-size: 52px; color: #ccc; margin-bottom: 16px; display: block; }
        .empty-state p { font-size: 15px; margin-bottom: 14px; }

        .reset-btn {
            padding: 8px 22px;
            background: #1a6b3c;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        /* ===== LOADING MORE ===== */
        .loading-more {
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .spin-icon {
            display: inline-block;
            animation: spin 0.9s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>

    <script type="text/javascript">

        // ==================== STATE ====================
        const state = {
            currentPage     : 1,
            pageSize        : 100,
            isLoading       : false,
            hasMore         : true,
            totalProducts   : 0,
            currentCategory : 'all',
            currentSearchTerm: '',
            allProducts     : [],
            categories      : [],
            productStockLevels: {},
            ownerId  : parseInt(document.getElementById('hdnOwnerId').value)   || 0,
            ownerType: 'LSC'            || ''
            //ownerType: document.getElementById('hdnOwnerType').value            || ''
        };

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', function () {
            loadCategories();
            loadProducts(true);
            initEventListeners();
        });

        function initEventListeners() {
            document.getElementById('searchButton').addEventListener('click', performSearch);

            document.getElementById('productSearch').addEventListener('keyup', function (e) {
                if (e.key === 'Enter') performSearch();
            });

            // Infinite scroll
            document.getElementById('productGridContainer').addEventListener('scroll', function () {
                if (state.isLoading || !state.hasMore) return;
                if (this.scrollTop + this.clientHeight >= this.scrollHeight - 250) {
                    loadProducts(false);
                }
            });
        }

        // ==================== CATEGORIES ====================
        function loadCategories() {
            fetch('fpc_23_lscProductPage.aspx/GetCategories', {
                method : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body   : JSON.stringify({
                    ownerId  : state.ownerId,
                    ownerType: state.ownerType
                })
            })
            .then(r => r.json())
            .then(result => {
                if (result.d && result.d.success) {
                    state.categories = result.d.categories || [];
                    renderCategoryButtons();
                }
            })
            .catch(err => console.error('Error loading categories:', err));
        }

        function renderCategoryButtons() {
            const container = document.getElementById('categoryButtons');
            container.innerHTML = '<button class="cat-btn active" data-category="all">All Products</button>';

            state.categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.setAttribute('data-category', cat);
                btn.textContent = cat;
                container.appendChild(btn);
            });

            attachCategoryEvents();
        }

        function attachCategoryEvents() {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    state.currentCategory  = this.getAttribute('data-category');
                    state.currentPage      = 1;
                    state.hasMore          = true;
                    loadProducts(true);
                });
            });
        }

        // ==================== PRODUCTS ====================
        function loadProducts(reset) {
            if (reset) {
                state.currentPage  = 1;
                state.hasMore      = true;
                state.allProducts  = [];
                document.getElementById('productGrid').innerHTML = '';
            }

            if (state.isLoading || !state.hasMore) return;

            state.isLoading = true;

            if (state.currentPage === 1) {
                showSkeletons();
            } else {
                showLoadingMore();
            }

            fetch('fpc_23_lscProductPage.aspx/GetProducts', {
                method : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body   : JSON.stringify({
                    page      : state.currentPage,
                    pageSize  : state.pageSize,
                    category  : state.currentCategory === 'all' ? '' : state.currentCategory,
                    searchTerm: state.currentSearchTerm,
                    sortBy    : 'newest',
                    ownerId   : state.ownerId,
                    ownerType : state.ownerType
                })
            })
            .then(r => r.json())
            .then(result => {
                if (result.d && result.d.success) {
                    const products = result.d.products || [];
                    state.hasMore      = result.d.hasMore   || false;
                    state.totalProducts = result.d.totalCount || 0;

                    products.forEach(p => {
                        state.productStockLevels[p.prod_stock_id] = p.instock || 0;
                    });

                    state.allProducts = reset ? products : [...state.allProducts, ...products];
                    renderProducts(products, reset);
                    state.currentPage++;
                    updateCountBar();
                }
            })
            .catch(err => {
                console.error('Error loading products:', err);
                showErrorState('Failed to load products. Please try again.');
            })
            .finally(() => {
                state.isLoading = false;
                removeSkeletons();
                hideLoadingMore();
            });
        }

        function renderProducts(products, reset) {
            const grid = document.getElementById('productGrid');

            if (reset) grid.innerHTML = '';

            const existing = grid.querySelector('.empty-state');
            if (existing) existing.remove();

            if (products.length === 0 && state.currentPage === 1) {
                showEmptyState();
                return;
            }

            const frag = document.createDocumentFragment();
            products.forEach(p => frag.appendChild(createProductCard(p)));
            grid.appendChild(frag);
        }

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';

            const instock = state.productStockLevels[product.prod_stock_id] || product.instock || 0;
            if (instock <= 0) card.classList.add('out-of-stock');

            card.setAttribute('data-product-stock-id', product.prod_stock_id);
            card.setAttribute('data-product-id', product.prod_id);

            let stockClass = 'stock-good';
            let stockText  = '';
            if (instock <= 0)  { stockClass = 'stock-out'; stockText = 'Out of Stock'; }
            else if (instock < 10) { stockClass = 'stock-low'; stockText = `Low Stock: ${instock}`; }
            else { stockText = `In Stock: ${instock}`; }

            const imageUrl = product.prod_image
                ? `IMAGES_FPC/products/${product.prod_image}`
                : 'https://via.placeholder.com/300x200?text=No+Image';

            let html = '';

            if (product.prod_stock_discount_percentage > 0) {
                html += `<div class="discount-tag">${product.prod_stock_discount_percentage}% OFF</div>`;
            }

            html += `
                <img src="${imageUrl}" class="product-image"
                     alt="${product.prod_name || 'Product'}"
                     onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                <div class="product-content">
                    <span class="product-category">${product.category || 'General'}</span>
                    <div class="product-name">${product.prod_name || 'Product ' + product.prod_id}</div>
                    <div class="product-price-row">
                        <span class="product-price">&#8377;${fmt(product.prod_stock_sale_price_after_discount)}</span>`;

            if (product.prod_stock_discount_percentage > 0) {
                html += `<span class="original-price">&#8377;${fmt(product.prod_stock_sale_price)}</span>`;
            }

            html += `
                    </div>
                    <div class="product-meta">
                        <span>Unit: ${product.unit || 'Piece'}</span>
                        <span>${product.sku || 'SKU-' + product.prod_id}</span>
                    </div>
                    <div class="stock-info">
                        <span class="${stockClass}">${stockText}</span>
                    </div>
                </div>`;

            card.innerHTML = html;
            return card;
        }

        // ==================== SEARCH ====================
        function performSearch() {
            state.currentSearchTerm = document.getElementById('productSearch').value.trim();
            state.currentPage = 1;
            state.hasMore = true;
            loadProducts(true);
        }

        window.clearFilters = function () {
            state.currentCategory   = 'all';
            state.currentSearchTerm = '';
            document.getElementById('productSearch').value = '';
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-category') === 'all');
            });
            state.currentPage = 1;
            state.hasMore = true;
            loadProducts(true);
        };

        // ==================== LOADING HELPERS ====================
        function showSkeletons() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const s = document.createElement('div');
                s.className = 'skeleton-card';
                s.innerHTML = `<div class="skeleton-img"></div>
                               <div class="skeleton-body">
                                 <div class="skeleton-line short"></div>
                                 <div class="skeleton-line"></div>
                                 <div class="skeleton-line short"></div>
                               </div>`;
                grid.appendChild(s);
            }
        }

        function removeSkeletons() {
            document.querySelectorAll('.skeleton-card').forEach(s => s.remove());
        }

        function showLoadingMore() {
            hideLoadingMore();
            const grid = document.getElementById('productGrid');
            const div  = document.createElement('div');
            div.id = 'loadingMoreDiv';
            div.className = 'loading-more';
            div.innerHTML = `<i class="fas fa-spinner spin-icon"></i> Loading more products...`;
            grid.appendChild(div);
        }

        function hideLoadingMore() {
            const el = document.getElementById('loadingMoreDiv');
            if (el) el.remove();
        }

        function showEmptyState() {
            const grid = document.getElementById('productGrid');
            const div  = document.createElement('div');
            div.className = 'empty-state';
            const msg = state.currentSearchTerm
                ? `No products match "<strong>${state.currentSearchTerm}</strong>"`
                : state.currentCategory !== 'all'
                    ? `No products in "<strong>${state.currentCategory}</strong>"`
                    : 'No products available';
            div.innerHTML = `<i class="fas fa-box-open"></i>
                             <p>${msg}</p>
                             <button class="reset-btn" onclick="clearFilters()">Clear Filters</button>`;
            grid.appendChild(div);
        }

        function showErrorState(msg) {
            const grid = document.getElementById('productGrid');
            const div  = document.createElement('div');
            div.className = 'empty-state';
            div.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#dc3545"></i>
                             <p>${msg}</p>
                             <button class="reset-btn" onclick="loadProducts(true)">Try Again</button>`;
            grid.appendChild(div);
        }

        function updateCountBar() {
            document.getElementById('productCount').textContent  = state.allProducts.length;
            document.getElementById('totalProducts').textContent = state.totalProducts;
        }

        // ==================== FORMAT HELPER ====================
        function fmt(n) {
            return parseFloat(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

    </script>

    <script>
        // ===== COLLAPSIBLE MENU TOGGLE =====
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const menuToggleIcon = document.getElementById('menuToggleIcon');
        const slideMenu = document.getElementById('slideMenu');
        const menuOverlay = document.getElementById('menuOverlay');

        function openMenu() {
            slideMenu.classList.add('open');
            menuOverlay.classList.add('show');
            menuToggleIcon.classList.remove('fa-bars');
            menuToggleIcon.classList.add('fa-times');
        }

        function closeMenu() {
            slideMenu.classList.remove('open');
            menuOverlay.classList.remove('show');
            menuToggleIcon.classList.remove('fa-times');
            menuToggleIcon.classList.add('fa-bars');
        }

        menuToggleBtn.addEventListener('click', function () {
            if (slideMenu.classList.contains('open')) {
                closeMenu();
            } else {
                openMenu();
            }
        });

        menuOverlay.addEventListener('click', closeMenu);

        // ===== BOTTOM NAV ACTIVE STATE =====
        (function () {
            const currentPage = window.location.pathname.split('/').pop().toLowerCase();
            const navMap = {
                'fpc_22_lsc_crp_dashboard.aspx': 'nav-home',
                'fpc_23_lscproductpage.aspx': 'nav-product'
            };
            const activeId = navMap[currentPage];
            if (activeId) {
                const el = document.getElementById(activeId);
                if (el) el.classList.add('active');
            }
        })();
    </script>
