    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(160deg, #0d5c30 0%, #1a6b3c 40%, #2d9b5a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 20px;
            overflow-x: hidden;
        }

        /* ===== DECORATIVE BACKGROUND CIRCLES ===== */
        body::before {
            content: '';
            position: fixed;
            top: -80px;
            right: -80px;
            width: 260px;
            height: 260px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -60px;
            left: -60px;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ===== TOP LOGO AREA ===== */
        .logo-area {
            text-align: center;
            margin-bottom: 32px;
            color: white;
        }

        .logo-icon-wrap {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.15);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            backdrop-filter: blur(6px);
        }

        .logo-icon-wrap i {
            font-size: 38px;
            color: white;
        }

        .logo-area h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .logo-area p {
            font-size: 13px;
            opacity: 0.82;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ===== LOGIN CARD ===== */
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 13px;
            color: #7a8090;
            margin-bottom: 26px;
        }

        /* ===== FORM GROUPS ===== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i.icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #1a6b3c;
            font-size: 16px;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 44px 14px 44px;
            border: 1.5px solid #e0e4ea;
            border-radius: 12px;
            font-size: 15px;
            color: #222;
            background: #f8faf8;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            -webkit-appearance: none;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: #1a6b3c;
            background: white;
            box-shadow: 0 0 0 3px rgba(26,107,60,0.12);
        }

        .input-wrap input::placeholder {
            color: #bbb;
            font-size: 14px;
        }

        /* Password toggle eye icon */
        .pwd-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }

        .pwd-toggle:hover { color: #1a6b3c; }

        /* ===== ERROR LABEL ===== */
        .error-box {
            background: #fff5f5;
            border: 1px solid #fcc;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #cc2a2a;
            font-weight: 500;
        }

        .error-box.visible { display: flex; }
        .error-box i { font-size: 15px; flex-shrink: 0; }

        /* ASP label error (hidden span re-styled) */
        #lbl_error:not(:empty) {
            display: block;
        }

        /* ===== LOGIN BUTTON ===== */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1a6b3c 0%, #2d9b5a 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(26,107,60,0.35);
            margin-top: 6px;
        }

        .login-btn:active {
            transform: scale(0.98);
            opacity: 0.92;
        }

        .login-btn i { font-size: 16px; }

        /* ===== FOOTER ICONS ===== */
        .footer-icons {
            display: flex;
            justify-content: center;
            gap: 22px;
            margin-top: 26px;
            opacity: 0.35;
        }

        .footer-icons i {
            font-size: 20px;
            color: #1a6b3c;
        }

        /* ===== APP VERSION ===== */
        .app-version {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        /* ===== LANDSCAPE ADJUSTMENT ===== */
        @media (max-height: 600px) and (orientation: landscape) {
            body { padding: 16px 20px; }
            .logo-area { margin-bottom: 18px; }
            .logo-icon-wrap { width: 60px; height: 60px; border-radius: 18px; margin-bottom: 10px; }
            .logo-icon-wrap i { font-size: 28px; }
            .logo-area h1 { font-size: 20px; }
            .login-card { padding: 22px 24px 20px; }
            .form-group { margin-bottom: 12px; }
        }
    </style>
</head>

    <script>
        // ===== SHOW ERROR BOX IF LABEL HAS TEXT =====
        (function () {
            var lbl = document.getElementById('lbl_error');
            var box = document.getElementById('errorBox');
            if (lbl && lbl.innerText.trim() !== '') {
                box.classList.add('visible');
            }
        })();

        // ===== PASSWORD SHOW / HIDE TOGGLE =====
        var pwdToggle = document.getElementById('pwdToggle');
        var pwdInput  = document.getElementById('txt_password');

        pwdToggle.addEventListener('click', function () {
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                pwdToggle.classList.replace('fa-eye', 'fa-eye-slash');
                pwdToggle.style.color = '#1a6b3c';
            } else {
                pwdInput.type = 'password';
                pwdToggle.classList.replace('fa-eye-slash', 'fa-eye');
                pwdToggle.style.color = '#aaa';
            }
        });
    </script>
